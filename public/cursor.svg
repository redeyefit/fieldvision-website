<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
  <!-- dark underlay for visibility on light areas -->
  <g fill="none" stroke="#000000" stroke-opacity="0.35" stroke-width="3.5" stroke-linecap="round">
    <circle cx="14" cy="14" r="7"/>
    <line x1="14" y1="1.5" x2="14" y2="5"/>
    <line x1="14" y1="23" x2="14" y2="26.5"/>
    <line x1="1.5" y1="14" x2="5" y2="14"/>
    <line x1="23" y1="14" x2="26.5" y2="14"/>
  </g>
  <!-- blue reticle -->
  <g fill="none" stroke="#4aa8e0" stroke-width="1.6" stroke-linecap="round">
    <circle cx="14" cy="14" r="7"/>
    <line x1="14" y1="1.5" x2="14" y2="5"/>
    <line x1="14" y1="23" x2="14" y2="26.5"/>
    <line x1="1.5" y1="14" x2="5" y2="14"/>
    <line x1="23" y1="14" x2="26.5" y2="14"/>
  </g>
  <!-- center dot -->
  <circle cx="14" cy="14" r="2.4" fill="#000000" fill-opacity="0.35"/>
  <circle cx="14" cy="14" r="1.5" fill="#ffffff"/>
</svg>
